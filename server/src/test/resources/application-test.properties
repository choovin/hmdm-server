# Test application properties for Headwind MDM
# Used for unit and integration tests

# Database configuration (H2 in-memory for tests)
db.driver=org.h2.Driver
db.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
db.username=sa
db.password=

# Liquibase
liquibase.enabled=true
liquibase.dropFirst=true

# Test-specific settings
test.mode=true
